# openclaw/nginx-http.conf
# Temporary HTTP-only config used during initial certbot provisioning.
# Replaced by nginx.conf once certs are obtained.

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'waiting for TLS setup';
        add_header Content-Type text/plain;
    }
}
