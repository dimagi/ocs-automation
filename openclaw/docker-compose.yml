# openclaw/docker-compose.yml
services:
  # Docker socket proxy — allowlists only the API calls OpenClaw needs.
  # SECURITY NOTE: Even with the proxy, openclaw runs as root (user: "0:0") and
  # has container management capability. This is a known trade-off: the proxy
  # limits blast radius from a webhook exploit but does not eliminate it.
  # Do not expose the socket-proxy port externally.
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: openclaw-socket-proxy
    restart: unless-stopped
    environment:
      # Allow only what OpenClaw needs: list/inspect/create/start/stop containers
      CONTAINERS: 1
      POST: 1
      # Deny everything else
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      INFO: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      DOCKER_HOST: tcp://socket-proxy:2375
    volumes:
      - /data/openclaw/config:/home/node/.openclaw
      - /data/openclaw/workspace:/home/node/openclaw/workspace
      - /data/sessions:/data/sessions
    ports:
      - "3000:3000"
    user: "0:0"
    depends_on:
      - socket-proxy
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - openclaw
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
